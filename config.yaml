# When is a game's prize pool "too low" to keep on the counter?
# A game is flagged if ANY rule below trips. Set a rule to null to disable it.
thresholds:
  top_prize_pct: 0.25        # flag when fewer than 25% of the TOP prizes are still unclaimed
  top_prize_count_floor: 1   # OR flag when there are this many top prizes left or fewer
  total_prize_pct: null      # OR flag on all-tier prizes (e.g. 0.20). null = off.

# If true, evaluate the low-prize rule for EVERY active game (useful for spotting
# fresh games worth stocking). If false, only the games in `inventory` above are
# checked for the low-prize alert (ended-game alerts always cover everything).
report_all_games: true
