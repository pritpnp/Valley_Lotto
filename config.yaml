# When is a game's prize pool "too low" to keep on the counter?
# A game is flagged if ANY rule below trips. Set a rule to null to disable it.
thresholds:
  # WIN ODDS — the main "is this game worth playing?" number. PA publishes the
  # overall odds of winning ANY prize (e.g. 1:3.82). Lower is better, and it stays
  # about the same for a game's whole life, so it's the best guide to which games
  # give customers a fair shot at breaking even. Flag games worse than this cutoff.
  weak_odds: 4.5             # mark a game 🔻 WEAK ODDS if its odds are worse than 1:4.5

  # SWAP — separately, drop a game once its big prizes are mostly claimed (the
  # value/excitement is drained), even if the odds are still fine. The original top
  # count comes from each game's PA detail page ("offers N Top Prizes of $X").
  top_prize_pct: 0.40        # 🟠 SWAP when fewer than 40% of the top prizes remain
  top_prize_count_floor: 1   # OR when the top prize is down to its last 1 (and depleting)

# If true, evaluate the low-prize rule for EVERY active game (useful for spotting
# fresh games worth stocking) using the estimated original count. True original
# counts are only fetched for the games in `inventory` above (one detail-page
# request each, cached). Ended-game alerts always cover every game.
report_all_games: true

# How many days of scraped (raw HTML) + parsed (JSON) snapshots to keep in the
# repo. We scrape twice a day, so this keeps the newest retention_days * 2 files
# under data/snapshots and data/raw, pruning anything older.
retention_days: 30
