name: Fetch SalesMaker PDF (debug)
on:
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests pdfminer.six
      - run: python scripts/fetch_pdf.py
      - name: Commit extracted text
        run: |
          git config user.name "valley-lotto-bot"
          git config user.email "noreply@anthropic.com"
          git add -f debug/salesmaker.txt
          git diff --cached --quiet || { git commit -m "debug: extract SalesMaker PDF text"; git push; }
