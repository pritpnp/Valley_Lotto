name: Capture PA page structure (debug)
on:
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scripts/capture.py
      - name: Commit raw HTML
        run: |
          git config user.name "valley-lotto-bot"
          git config user.email "noreply@anthropic.com"
          git add -f debug
          git diff --cached --quiet || { git commit -m "debug: capture live PA detail pages"; git push; }
